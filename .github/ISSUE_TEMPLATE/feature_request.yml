name: Feature request
description: Suggest a new feature or API change
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        For non-trivial features or API changes, please open an issue before a PR.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Workflows
        - HTTP adapter
        - Storage
        - Email
        - Password hashing
        - Tokens
        - Sessions
        - Types
        - Documentation
        - Package
        - Other
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
