services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: effect_auth_example
      POSTGRES_USER: effect_auth
      POSTGRES_PASSWORD: effect_auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U effect_auth -d effect_auth_example"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - effect_auth_postgres_data:/var/lib/postgresql/data

volumes:
  effect_auth_postgres_data:
